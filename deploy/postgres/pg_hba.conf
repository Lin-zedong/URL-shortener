# Local development authentication for the distributed URL Shortener prototype.
# This file is mounted by docker-compose so that the lightweight Java PostgreSQL
# wire client can connect without SCRAM-SHA-256.
# Never use this configuration for a real production deployment.

# TYPE  DATABASE        USER            ADDRESS                 METHOD
local   all             all                                     trust
host    all             all             0.0.0.0/0               trust
host    all             all             ::/0                    trust
